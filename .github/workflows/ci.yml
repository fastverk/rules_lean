name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast PR gate: rule-graph loads, stardoc-generated reference docs match
  # the .bzl docstrings (diff_test), build is green on both Linux and macOS.
  # Does *not* exercise `lake_workspace` — that's deferred to the slow job
  # so we don't pull mathlib on every push.
  test:
    name: bazel test //docs/...
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.10.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}
          repository-cache: true
      - run: bazel test //docs/... --test_output=errors

  buildifier:
    name: buildifier lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install buildifier
        run: |
          curl -fsSL -o /usr/local/bin/buildifier \
            https://github.com/bazelbuild/buildtools/releases/download/v7.3.1/buildifier-linux-amd64
          chmod +x /usr/local/bin/buildifier
      - run: buildifier --mode=check --lint=warn -r .

  # End-to-end smoke: actually runs `lake_workspace` against a Batteries-only
  # Lake workspace (no Mathlib → no multi-GB Reservoir cache download), then
  # typechecks a Lean file that imports Batteries. This exercises the full
  # chain: Lean toolchain download → lake update → lake build batteries →
  # lean_prebuilt_library → lean_test. Push-only (not a PR gate) because
  # building Batteries from source is ~1-2 min cold.
  lake_integration:
    name: lake_workspace end-to-end (batteries)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.10.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-lake
          repository-cache: true
      - run: bazel test //examples/batteries_smoke:smoke_test --test_output=errors
